# -----------------------------------------------------------------------
# Browser AI Coding Agent — Spring Boot Backend
# -----------------------------------------------------------------------

# Server port (default 8080)
server.port=8080

# Google Gemini API key — REQUIRED.
# Set via environment variable:  GEMINI_API_KEY=your_key_here
# Or provide directly here for local development only (do not commit keys).
gemini.api-key=${GEMINI_API_KEY:}

# Gemini model to use (optional, defaults to gemini-1.5-flash)
gemini.model=gemini-1.5-flash

# CORS — comma-separated list of allowed origins.
# Vite dev server runs on 5173 by default; add your production domain here.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}

# ---- Database (PostgreSQL) ------------------------------------------------
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/browserai}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ---- Redis ----------------------------------------------------------------
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ---- JWT ------------------------------------------------------------------
jwt.secret=${JWT_SECRET:changeme-please-set-a-secure-secret-in-production}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ---- Deployment APIs ------------------------------------------------------
vercel.token=${VERCEL_TOKEN:}
github.token=${GITHUB_TOKEN:}

# Logging
logging.level.com.browserai=INFO
